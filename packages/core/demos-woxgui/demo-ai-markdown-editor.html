<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>AIMarkdownEditor Demo (WoxGUI Theme)</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wox-gui@0.1.7/css/wox-theme.css">
		<link rel="stylesheet" href="../src/wox-theme-bridge.css">
		<style>
		body {
			font-family: var(--wox-font, 'Inter', 'Segoe UI', sans-serif);
			max-width: 800px;
			margin: 0 auto;
			padding: 20px;
			background: var(--wox-bg-app, #121214);
			color: var(--wox-text-primary, #eee);
		}
		.section {
			background: var(--wox-bg-panel, #17171a);
			padding: 20px;
			border-radius: 8px;
			margin-bottom: 20px;
			box-shadow: var(--wox-shadow-md, 0 4px 16px rgba(0,0,0,0.4));
			height: 600px;
			display: flex;
			flex-direction: column;
		}
		h2 {
			margin-top: 0;
		}
		liwe3-ai-markdown-editor {
			flex: 1;
			min-height: 0;
		}
		.controls {
			background: var(--wox-bg-panel, #17171a);
			padding: 20px;
			border-radius: 8px;
			margin-bottom: 20px;
			box-shadow: var(--wox-shadow-md, 0 4px 16px rgba(0,0,0,0.4));
		}
		.control-row {
			display: flex;
			align-items: center;
			gap: 10px;
			margin-bottom: 10px;
		}
		.control-row:last-child {
			margin-bottom: 0;
		}
		.control-row label {
			display: flex;
			align-items: center;
			gap: 8px;
			cursor: pointer;
		}
		.control-row input[type="checkbox"] {
			width: 18px;
			height: 18px;
			cursor: pointer;
		}
		.status {
			padding: 8px 12px;
			background: var(--wox-bg-toolbar, #1e1e22);
			border-radius: 4px;
			font-size: 14px;
			color: var(--wox-accent, #00e5ff);
		}
		</style>
	</head>
	<body>
		<h1>AIMarkdownEditor Demo</h1>

		<div class="controls">
			<h2>Controls</h2>
			<div class="control-row">
				<label>
					<input type="checkbox" id="showSettingsToggle" checked>
					Show Settings Button
				</label>
				<span class="status" id="settingsStatus">Settings: Visible</span>
			</div>
		</div>

		<div class="section">
			<h2>Markdown Editor</h2>
			<liwe3-ai-markdown-editor id="editor"></liwe3-ai-markdown-editor>
		</div>

		<script type="module" src="https://cdn.jsdelivr.net/npm/wox-gui@0.1.7/dist/wox-gui.cdn.js"></script>
		<script type="module">
		import { defineAIMarkdownEditor } from '../dist/AIMarkdownEditor.js';

		// Initialize component
		defineAIMarkdownEditor();

		const editor = document.getElementById( 'editor' );
		const showSettingsToggle = document.getElementById( 'showSettingsToggle' );
		const settingsStatus = document.getElementById( 'settingsStatus' );

		// Handle showSettings toggle
		showSettingsToggle.addEventListener( 'change', ( e ) => {
			const show = e.target.checked;
			editor.setShowSettings( show );
			settingsStatus.textContent = `Settings: ${show ? 'Visible' : 'Hidden'}`;
		} );

		// You can also set it via attribute:
		// editor.setAttribute('show-settings', 'false');

		// Optional: Set API key if you have one
		// editor.setApiKey('your-api-key');

		editor.addEventListener( 'change', ( e ) => {
			console.log( 'Content changed:', e.detail.value );
		} );
		</script>
	</body>
</html>
